version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: career-clarity-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: careerclarity2024
      MONGO_INITDB_DATABASE: career_clarity
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - career-clarity-network

volumes:
  mongodb_data:
    driver: local

networks:
  career-clarity-network:
    driver: bridge